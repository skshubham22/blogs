{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm border-0 rounded-4 py-5">
            <div class="card-body">
                <div class="mb-4">
                    <i class="fas fa-sign-out-alt fa-4x text-primary opacity-25"></i>
                </div>
                <h2 class="fw-bold mb-3">You have been logged out</h2>
                <p class="text-muted mb-4">Thank you for spending time with us today!</p>
                <div class="d-grid gap-2 col-md-8 mx-auto">
                    <a href="{% url 'login' %}" class="btn btn-primary rounded-pill py-2">Log In Again</a>
                    <a href="{% url 'blog-home' %}" class="btn btn-outline-secondary rounded-pill py-2">Return Home</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
