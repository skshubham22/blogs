{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-white border-0 pt-4 px-4">
                <h4 class="fw-bold mb-0">Delete Post?</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted">Are you sure you want to delete the post <strong>"{{ object.title }}"</strong>?
                    This action cannot be undone.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{% url 'post-detail' object.pk %}" class="btn btn-light rounded-pill px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger rounded-pill px-4">Delete Permanently</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
