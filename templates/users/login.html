<!-- templates/users/login.html -->
{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg" style="border-radius: var(--radius-lg); overflow: hidden;">
            <div class="card-header p-4 border-0" style="background: var(--primary-gradient);">
                <h3 class="mb-0 text-white fw-bold">Welcome Back</h3>
                <p class="text-white-50 mb-0 small">Log in to your BlogVerse account</p>
            </div>
            <div class="card-body p-4 p-lg-5">
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                            Sign In <i class="fas fa-sign-in-alt ms-2"></i>
                        </button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="mb-0 text-muted">
                        New to BlogVerse? <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Create account</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
