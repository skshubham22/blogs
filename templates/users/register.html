<!-- templates/users/register.html -->
{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg" style="border-radius: var(--radius-lg); overflow: hidden;">
            <div class="card-header p-4 border-0" style="background: var(--primary-gradient);">
                <h3 class="mb-0 text-white fw-bold">Join BlogVerse</h3>
                <p class="text-white-50 mb-0 small">Start your professional blogging journey today</p>
            </div>
            <div class="card-body p-4 p-lg-5">
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                            Create Account <i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="mb-0 text-muted">
                        Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const usernameField = document.querySelector('#div_id_username input');
    const submitBtn = document.querySelector('button[type="submit"]');

    if (usernameField) {
        usernameField.addEventListener('keyup', (e) => {
            const username = e.target.value;
            if (username.length > 0) {
                fetch(`{% url "validate-username" %}?username=${username}`)
                    .then(response => response.json())
                    .then(data => {
                        const existingError = document.getElementById('username-error');
                        if (existingError) {
                            existingError.remove();
                        }

                        if (data.is_taken) {
                            usernameField.classList.add('is-invalid');
                            const errorDiv = document.createElement('div');
                            errorDiv.id = 'username-error';
                            errorDiv.classList.add('invalid-feedback');
                            errorDiv.style.display = 'block';
                            errorDiv.innerHTML = `<strong>${data.error_message}</strong>`;
                            usernameField.parentNode.appendChild(errorDiv);
                            submitBtn.disabled = true;
                        } else {
                            usernameField.classList.remove('is-invalid');
                            usernameField.classList.add('is-valid');
                            submitBtn.disabled = false;
                        }
                    });
            }
        });
    }
</script>
{% endblock %}
